services:
  - type: web
    name: audyt-api
    env: python
    region: oregon
    plan: free
    buildCommand: "apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
